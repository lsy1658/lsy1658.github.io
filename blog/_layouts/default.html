<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% raw %}{{ page.title }} - {{ site.title }}{% endraw %}</title>
    <link rel="stylesheet" href="{% raw %}{{ '/assets/css/style.css' | relative_url }}{% endraw %}">
    {% raw %}{% seo %}{% endraw %}
    {% raw %}{% feed_meta %}{% endraw %}
</head>
<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" href="{% raw %}{{ '/' | relative_url }}{% endraw %}">{% raw %}{{ site.title }}{% endraw %}</a>
            <nav class="site-nav">
                <a href="{% raw %}{{ '/' | relative_url }}{% endraw %}">首页</a>
                <a href="{% raw %}{{ '/about' | relative_url }}{% endraw %}">关于</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="wrapper">
            {% raw %}{{ content }}{% endraw %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="wrapper">
            <p>&copy; {% raw %}{{ site.time | date: '%Y' }}{% endraw %} {% raw %}{{ site.author }}{% endraw %}. 保留所有权利。</p>
        </div>
    </footer>
</body>
</html>
